<head>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    align-items: center;
    justify-content: center;

  #lock-screen, #message-screen { width: 100%; max-width: 480px; }
  .year-tag { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: #ff5c2b; margin-bottom: 2.5rem; font-weight: 600; }
  .headline { font-size: 38px; font-weight: 600; color: #f0ede8; line-height: 1.2; margin-bottom: 1rem; font-family: Georgia, 'Times New Roman', serif; }
  .headline span { color: #ff5c2b; }
  .sub { font-size: 14px; color: #888; line-height: 1.75; margin-bottom: 3rem; max-width: 340px; }
  .input-row { display: flex; gap: 10px; align-items: stretch; margin-bottom: 10px; }
  #code-input { flex: 1; font-size: 15px; padding: 14px 18px; border: 1px solid #2a2a2a; border-radius: 6px; background: #1a1a1a; color: #f0ede8; outline: none; font-family: inherit; letter-spacing: 0.04em; transition: border-color 0.15s; }
  #code-input::placeholder { color: #444; }
  #code-input:focus { border-color: #ff5c2b; }
  #unlock-btn { padding: 14px 24px; font-size: 13px; font-weight: 600; background: #ff5c2b; color: #0d0d0d; border: none; border-radius: 6px; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; font-family: inherit; transition: background 0.15s; white-space: nowrap; }
  #unlock-btn:hover { background: #ff7a4d; }
  #error-msg { font-size: 12px; color: #ff5c2b; height: 16px; letter-spacing: 0.02em; }
  .footer-note { margin-top: 3.5rem; font-size: 12px; color: #444; line-height: 1.7; border-left: 2px solid #ff5c2b; padding-left: 14px; }
  .footer-note em { color: #666; font-style: normal; }
  #message-screen { display: none; }
  .msg-from { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: #ff5c2b; margin-bottom: 2rem; font-weight: 600; }
  .rule { width: 100%; height: 1px; background: #1e1e1e; margin-bottom: 2.5rem; }
  .msg-text { font-size: 18px; line-height: 1.85; color: #f0ede8; font-family: Georgia, 'Times New Roman', serif; font-weight: 400; margin-bottom: 3rem; white-space: pre-line; }
  .sign-off { font-size: 14px; color: #ff5c2b; font-style: italic; font-family: Georgia, 'Times New Roman', serif; font-weight: 600; }
  .reset-btn { margin-top: 3rem; display: inline-block; font-size: 11px; color: #444; background: none; border: none; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; font-family: inherit; padding: 0; transition: color 0.15s; }

<body>

    <input id="code-input" type="text" placeholder="enter your code" autocomplete="off" spellcheck="false" />
    <button id="unlock-btn">Open</button>
  </div>
  <p id="error-msg"></p>
  <p class="footer-note">Each code opens one message. Only yours. Only for you.<br><em>Didn't get a code? Don't worry — he's aging. Just ask him.</em></p>
</div>

<div id="message-screen">

  <button class="reset-btn" id="reset-btn">← back</button>
</div>

  const input = document.getElementById('code-input');
  const btn = document.getElementById('unlock-btn');
  const errMsg = document.getElementById('error-msg');
  const lockScreen = document.getElementById('lock-screen');
  const messageScreen = document.getElementById('message-screen');
  const msgContent = document.getElementById('msg-content');
  const resetBtn = document.getElementById('reset-btn');

  function unlock() {
    const code = input.value.trim();
    if (messages[code]) {
      errMsg.textContent = '';
      lockScreen.style.display = 'none';
      messageScreen.style.display = 'block';
      msgContent.textContent = messages[code];
    } else {
      errMsg.textContent = "That code doesn't match. Try again.";
      input.style.borderColor = '#ff5c2b';
      setTimeout(() => { input.style.borderColor = ''; }, 1500);
    }
  }

  btn.addEventListener('click', unlock);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
  resetBtn.addEventListener('click', () => {
    messageScreen.style.display = 'none';
    lockScreen.style.display = 'block';
    input.value = '';
    errMsg.textContent = '';
  });
